global:
  resolve_timeout: 5m

route:
  group_by: [alertname, service, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  receiver: ops-observability
  routes:
    - matchers:
        - severity="sev1"
      receiver: ops-critical
      repeat_interval: 15m
    - matchers:
        - severity="sev2"
      receiver: ops-alerts
      repeat_interval: 30m
    - matchers:
        - severity="sev3"
      receiver: ops-observability
      repeat_interval: 2h

receivers:
  - name: ops-critical
    # PagerDuty + critical Slack channel
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL_OPS_CRITICAL}"
        channel: "#ops-critical"
        send_resolved: true
        title: "[{{ .CommonLabels.severity }}] {{ .CommonLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}"

  - name: ops-alerts
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL_OPS_ALERTS}"
        channel: "#ops-alerts"
        send_resolved: true
        title: "[{{ .CommonLabels.severity }}] {{ .CommonLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}"

  - name: ops-observability
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL_OPS_OBSERVABILITY}"
        channel: "#ops-observability"
        send_resolved: true
        title: "[{{ .CommonLabels.severity }}] {{ .CommonLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}"
