<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="60%" cy="38%" r="75%">
      <stop offset="0%" style="stop-color:#fde8d0"/>
      <stop offset="55%" style="stop-color:#faf0e6"/>
      <stop offset="100%" style="stop-color:#f5e4d2"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e39a5d;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#e39a5d;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="coral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a56a"/>
      <stop offset="100%" style="stop-color:#d4845a"/>
    </linearGradient>
    <linearGradient id="coralLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f2cba8"/>
      <stop offset="100%" style="stop-color:#e8b08a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#c07040" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Glow center -->
  <ellipse cx="400" cy="280" rx="320" ry="260" fill="url(#glow)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.6" fill="#c07840" opacity="0.10"/>
  </pattern>
  <rect width="800" height="600" fill="url(#dots)"/>

  <!-- Decorative arcs -->
  <circle cx="760" cy="60" r="90" fill="#e39a5d" opacity="0.08"/>
  <circle cx="40" cy="560" r="70" fill="#e39a5d" opacity="0.08"/>
  <circle cx="740" cy="520" r="50" fill="#f2cba8" opacity="0.18"/>

  <!-- === SCISSORS === -->
  <g transform="translate(400, 240)" filter="url(#shadow)">
    <!-- Handle ring 1 -->
    <ellipse cx="-62" cy="-78" rx="28" ry="36" fill="none" stroke="url(#coral)" stroke-width="10" opacity="0.9"/>
    <!-- Handle ring 2 -->
    <ellipse cx="62" cy="-78" rx="28" ry="36" fill="none" stroke="url(#coralLight)" stroke-width="10" opacity="0.85"/>
    <!-- Blade 1 -->
    <line x1="-44" y1="-50" x2="90" y2="78" stroke="url(#coral)" stroke-width="9" stroke-linecap="round"/>
    <!-- Blade 2 -->
    <line x1="44" y1="-50" x2="-90" y2="78" stroke="url(#coralLight)" stroke-width="9" stroke-linecap="round"/>
    <!-- Pivot -->
    <circle cx="0" cy="14" r="11" fill="#fff8f0" stroke="#e39a5d" stroke-width="3"/>
    <circle cx="0" cy="14" r="4" fill="#e39a5d"/>
  </g>

  <!-- === COMB === -->
  <g transform="translate(260, 370)">
    <rect x="-70" y="-18" width="140" height="30" rx="10" fill="url(#coral)" opacity="0.88"/>
    <!-- Teeth -->
    <rect x="-56" y="12" width="11" height="50" rx="5.5" fill="#d4845a" opacity="0.82"/>
    <rect x="-36" y="12" width="11" height="58" rx="5.5" fill="#d4845a" opacity="0.82"/>
    <rect x="-16" y="12" width="11" height="54" rx="5.5" fill="#d4845a" opacity="0.82"/>
    <rect x="4" y="12" width="11" height="58" rx="5.5" fill="#d4845a" opacity="0.82"/>
    <rect x="24" y="12" width="11" height="50" rx="5.5" fill="#d4845a" opacity="0.82"/>
    <rect x="44" y="12" width="11" height="55" rx="5.5" fill="#d4845a" opacity="0.82"/>
  </g>

  <!-- === CHECKLIST card === -->
  <g transform="translate(540, 380)" filter="url(#shadow)">
    <rect x="-70" y="-90" width="160" height="175" rx="18" fill="#fffaf4" opacity="0.96" stroke="#e8c8a8" stroke-width="1.5"/>
    <!-- Rows -->
    <circle cx="-46" cy="-56" r="10" fill="#e39a5d" opacity="0.9"/>
    <text x="-46" y="-51" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle">✓</text>
    <rect x="-28" y="-64" width="80" height="14" rx="5" fill="#f2cba8" opacity="0.55"/>

    <circle cx="-46" cy="-22" r="10" fill="#e39a5d" opacity="0.9"/>
    <text x="-46" y="-17" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle">✓</text>
    <rect x="-28" y="-30" width="65" height="14" rx="5" fill="#f2cba8" opacity="0.55"/>

    <circle cx="-46" cy="12" r="10" fill="#e8c8a8" opacity="0.7" stroke="#e39a5d" stroke-width="1.5"/>
    <rect x="-28" y="4" width="72" height="14" rx="5" fill="#f2cba8" opacity="0.35"/>

    <circle cx="-46" cy="46" r="10" fill="#e8c8a8" opacity="0.7" stroke="#e39a5d" stroke-width="1.5"/>
    <rect x="-28" y="38" width="55" height="14" rx="5" fill="#f2cba8" opacity="0.35"/>

    <circle cx="-46" cy="58" r="10" fill="#e8c8a8" opacity="0.7" stroke="#e39a5d" stroke-width="1.5"/>
    <rect x="-28" y="50" width="68" height="14" rx="5" fill="#f2cba8" opacity="0.35"/>
  </g>

  <!-- Category pill -->
  <rect x="280" y="112" width="240" height="40" rx="20" fill="#e39a5d" opacity="0.18"/>
  <rect x="280" y="112" width="240" height="40" rx="20" fill="none" stroke="#e39a5d" stroke-width="1.5" opacity="0.4"/>
  <text x="400" y="138" font-family="'Plus Jakarta Sans',sans-serif" font-size="15" font-weight="700" fill="#c07840" text-anchor="middle" letter-spacing="1">GROOMING</text>

  <!-- Paw prints -->
  <g transform="translate(108, 140)" opacity="0.18">
    <ellipse cx="0" cy="0" rx="12" ry="14" fill="#e39a5d"/>
    <ellipse cx="-16" cy="-14" rx="7" ry="8" fill="#e39a5d"/>
    <ellipse cx="16" cy="-14" rx="7" ry="8" fill="#e39a5d"/>
    <ellipse cx="-24" cy="2" rx="7" ry="8" fill="#e39a5d"/>
    <ellipse cx="24" cy="2" rx="7" ry="8" fill="#e39a5d"/>
  </g>
  <g transform="translate(680, 490)" opacity="0.14">
    <ellipse cx="0" cy="0" rx="10" ry="12" fill="#e39a5d"/>
    <ellipse cx="-13" cy="-12" rx="6" ry="7" fill="#e39a5d"/>
    <ellipse cx="13" cy="-12" rx="6" ry="7" fill="#e39a5d"/>
    <ellipse cx="-20" cy="2" rx="6" ry="7" fill="#e39a5d"/>
    <ellipse cx="20" cy="2" rx="6" ry="7" fill="#e39a5d"/>
  </g>
  <g transform="translate(700, 120)" opacity="0.12">
    <ellipse cx="0" cy="0" rx="8" ry="10" fill="#e39a5d"/>
    <ellipse cx="-11" cy="-10" rx="5" ry="6" fill="#e39a5d"/>
    <ellipse cx="11" cy="-10" rx="5" ry="6" fill="#e39a5d"/>
    <ellipse cx="-17" cy="2" rx="5" ry="6" fill="#e39a5d"/>
    <ellipse cx="17" cy="2" rx="5" ry="6" fill="#e39a5d"/>
  </g>
</svg>
