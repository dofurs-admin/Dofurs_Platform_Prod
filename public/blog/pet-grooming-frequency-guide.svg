<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="52%" cy="40%" r="74%">
      <stop offset="0%" style="stop-color:#fde8d0"/>
      <stop offset="55%" style="stop-color:#faf0e6"/>
      <stop offset="100%" style="stop-color:#f5e4d2"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e39a5d;stop-opacity:0.20"/>
      <stop offset="100%" style="stop-color:#e39a5d;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="coral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a56a"/>
      <stop offset="100%" style="stop-color:#d4845a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#c07040" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="290" rx="300" ry="250" fill="url(#glow)"/>
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.6" fill="#c07840" opacity="0.09"/>
  </pattern>
  <rect width="800" height="600" fill="url(#dots)"/>
  <circle cx="740" cy="70" r="80" fill="#e39a5d" opacity="0.07"/>
  <circle cx="60" cy="540" r="65" fill="#e39a5d" opacity="0.07"/>

  <!-- === CALENDAR === -->
  <g transform="translate(330, 310)" filter="url(#shadow)">
    <!-- Body -->
    <rect x="-148" y="-130" width="296" height="255" rx="22" fill="#fff8f0" stroke="#e8c8a8" stroke-width="2.5"/>
    <!-- Header bar -->
    <rect x="-148" y="-130" width="296" height="65" rx="22" fill="url(#coral)" opacity="0.90"/>
    <rect x="-148" y="-84" width="296" height="20" fill="url(#coral)" opacity="0.90"/>
    <!-- Month label -->
    <text x="0" y="-95" font-family="'Plus Jakarta Sans',sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="1">GROOMING SCHEDULE</text>
    <!-- Calendar rings -->
    <rect x="-90" y="-148" width="16" height="34" rx="8" fill="#e39a5d" opacity="0.85"/>
    <rect x="74" y="-148" width="16" height="34" rx="8" fill="#e39a5d" opacity="0.85"/>
    <!-- Day headers -->
    <text x="-116" y="-52" font-family="sans-serif" font-size="12" fill="#c07840" font-weight="600">M</text>
    <text x="-74" y="-52" font-family="sans-serif" font-size="12" fill="#c07840" font-weight="600">T</text>
    <text x="-32" y="-52" font-family="sans-serif" font-size="12" fill="#c07840" font-weight="600">W</text>
    <text x="10" y="-52" font-family="sans-serif" font-size="12" fill="#c07840" font-weight="600">T</text>
    <text x="52" y="-52" font-family="sans-serif" font-size="12" fill="#c07840" font-weight="600">F</text>
    <text x="94" y="-52" font-family="sans-serif" font-size="12" fill="#c07840" font-weight="600">S</text>
    <text x="128" y="-52" font-family="sans-serif" font-size="12" fill="#c07840" font-weight="600">S</text>
    <!-- Week 1 -->
    <text x="-116" y="-14" font-family="sans-serif" font-size="14" fill="#3a2a1a">1</text>
    <text x="-74" y="-14" font-family="sans-serif" font-size="14" fill="#3a2a1a">2</text>
    <!-- Grooming day highlighted -->
    <circle cx="-28" cy="-22" r="16" fill="#e39a5d" opacity="0.88"/>
    <text x="-28" y="-17" font-family="sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">✦</text>
    <text x="10" y="-14" font-family="sans-serif" font-size="14" fill="#3a2a1a">4</text>
    <text x="52" y="-14" font-family="sans-serif" font-size="14" fill="#3a2a1a">5</text>
    <text x="94" y="-14" font-family="sans-serif" font-size="14" fill="#3a2a1a">6</text>
    <text x="128" y="-14" font-family="sans-serif" font-size="14" fill="#3a2a1a">7</text>
    <!-- Week 2 -->
    <text x="-116" y="24" font-family="sans-serif" font-size="14" fill="#3a2a1a">8</text>
    <text x="-74" y="24" font-family="sans-serif" font-size="14" fill="#3a2a1a">9</text>
    <text x="-32" y="24" font-family="sans-serif" font-size="14" fill="#3a2a1a">10</text>
    <text x="10" y="24" font-family="sans-serif" font-size="14" fill="#3a2a1a">11</text>
    <text x="52" y="24" font-family="sans-serif" font-size="14" fill="#3a2a1a">12</text>
    <text x="94" y="24" font-family="sans-serif" font-size="14" fill="#3a2a1a">13</text>
    <text x="128" y="24" font-family="sans-serif" font-size="14" fill="#3a2a1a">14</text>
    <!-- Week 3 with another groom -->
    <text x="-116" y="62" font-family="sans-serif" font-size="14" fill="#3a2a1a">15</text>
    <text x="-74" y="62" font-family="sans-serif" font-size="14" fill="#3a2a1a">16</text>
    <circle cx="-28" cy="54" r="16" fill="#f2cba8" stroke="#e39a5d" stroke-width="2.5"/>
    <text x="-28" y="59" font-family="sans-serif" font-size="13" fill="#e39a5d" text-anchor="middle" font-weight="700">✦</text>
    <text x="10" y="62" font-family="sans-serif" font-size="14" fill="#3a2a1a">18</text>
    <text x="52" y="62" font-family="sans-serif" font-size="14" fill="#3a2a1a">19</text>
    <text x="94" y="62" font-family="sans-serif" font-size="14" fill="#3a2a1a">20</text>
    <text x="128" y="62" font-family="sans-serif" font-size="14" fill="#3a2a1a">21</text>
    <!-- Week 4 -->
    <text x="-116" y="100" font-family="sans-serif" font-size="14" fill="#3a2a1a">22</text>
    <text x="-74" y="100" font-family="sans-serif" font-size="14" fill="#3a2a1a">23</text>
    <text x="-32" y="100" font-family="sans-serif" font-size="14" fill="#3a2a1a">24</text>
    <text x="10" y="100" font-family="sans-serif" font-size="14" fill="#3a2a1a">25</text>
    <text x="52" y="100" font-family="sans-serif" font-size="14" fill="#3a2a1a">26</text>
    <text x="94" y="100" font-family="sans-serif" font-size="14" fill="#3a2a1a">27</text>
    <text x="128" y="100" font-family="sans-serif" font-size="14" fill="#3a2a1a">28</text>
  </g>

  <!-- === BRUSH (right side) === -->
  <g transform="translate(620, 300)" filter="url(#shadow)">
    <!-- Handle -->
    <rect x="-18" y="-110" width="36" height="120" rx="18" fill="url(#coral)" opacity="0.88"/>
    <!-- Brush head -->
    <rect x="-36" y="10" width="72" height="58" rx="10" fill="#f2cba8" stroke="#e39a5d" stroke-width="2.5" opacity="0.92"/>
    <!-- Bristles -->
    <line x1="-22" y1="68" x2="-22" y2="92" stroke="#e39a5d" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    <line x1="-10" y1="68" x2="-10" y2="96" stroke="#e39a5d" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    <line x1="2" y1="68" x2="2" y2="92" stroke="#e39a5d" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    <line x1="14" y1="68" x2="14" y2="96" stroke="#e39a5d" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    <line x1="26" y1="68" x2="26" y2="91" stroke="#e39a5d" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
  </g>

  <!-- Category pill -->
  <rect x="280" y="108" width="240" height="42" rx="21" fill="#e39a5d" opacity="0.16"/>
  <rect x="280" y="108" width="240" height="42" rx="21" fill="none" stroke="#e39a5d" stroke-width="1.5" opacity="0.38"/>
  <text x="400" y="135" font-family="'Plus Jakarta Sans',sans-serif" font-size="15" font-weight="700" fill="#c07840" text-anchor="middle" letter-spacing="1">GROOMING</text>

  <!-- Paw prints -->
  <g transform="translate(115, 152)" opacity="0.16">
    <ellipse cx="0" cy="0" rx="12" ry="14" fill="#e39a5d"/>
    <ellipse cx="-16" cy="-14" rx="7" ry="8" fill="#e39a5d"/>
    <ellipse cx="16" cy="-14" rx="7" ry="8" fill="#e39a5d"/>
    <ellipse cx="-24" cy="2" rx="7" ry="8" fill="#e39a5d"/>
    <ellipse cx="24" cy="2" rx="7" ry="8" fill="#e39a5d"/>
  </g>
  <g transform="translate(680, 490)" opacity="0.13">
    <ellipse cx="0" cy="0" rx="10" ry="12" fill="#e39a5d"/>
    <ellipse cx="-13" cy="-12" rx="6" ry="7" fill="#e39a5d"/>
    <ellipse cx="13" cy="-12" rx="6" ry="7" fill="#e39a5d"/>
    <ellipse cx="-20" cy="2" rx="6" ry="7" fill="#e39a5d"/>
    <ellipse cx="20" cy="2" rx="6" ry="7" fill="#e39a5d"/>
  </g>
</svg>
