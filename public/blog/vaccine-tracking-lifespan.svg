<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" style="stop-color:#fde8d0"/>
      <stop offset="55%" style="stop-color:#faf0e6"/>
      <stop offset="100%" style="stop-color:#f5e4d2"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e39a5d;stop-opacity:0.20"/>
      <stop offset="100%" style="stop-color:#e39a5d;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="coral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a56a"/>
      <stop offset="100%" style="stop-color:#d4845a"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e39a5d;stop-opacity:0.30"/>
      <stop offset="100%" style="stop-color:#e39a5d;stop-opacity:0.04"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#c07040" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="290" rx="310" ry="255" fill="url(#glow)"/>
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.6" fill="#c07840" opacity="0.09"/>
  </pattern>
  <rect width="800" height="600" fill="url(#dots)"/>
  <circle cx="740" cy="70" r="80" fill="#e39a5d" opacity="0.07"/>
  <circle cx="60" cy="540" r="65" fill="#e39a5d" opacity="0.07"/>

  <!-- === CHART CARD === -->
  <g transform="translate(380, 315)" filter="url(#shadow)">
    <!-- Card -->
    <rect x="-200" y="-155" width="400" height="290" rx="24" fill="#fff8f0" stroke="#e8c8a8" stroke-width="2"/>
    <!-- Title bar -->
    <text x="0" y="-120" font-family="'Plus Jakarta Sans',sans-serif" font-size="14" font-weight="700" fill="#c07840" text-anchor="middle" letter-spacing="0.5">PET LIFESPAN IMPACT</text>
    <!-- Y-axis -->
    <line x1="-150" y1="-90" x2="-150" y2="100" stroke="#e8c8a8" stroke-width="2"/>
    <!-- X-axis -->
    <line x1="-150" y1="100" x2="170" y2="100" stroke="#e8c8a8" stroke-width="2"/>
    <!-- X axis label -->
    <text x="10" y="122" font-family="sans-serif" font-size="11" fill="#a08060" text-anchor="middle">Vaccine Adherence →</text>
    <!-- Y axis label -->
    <text x="-168" y="5" font-family="sans-serif" font-size="11" fill="#a08060" text-anchor="middle" transform="rotate(-90,-168,5)">Lifespan</text>
    <!-- Area fill under good line -->
    <polygon points="-150,100 -100,78 -50,52 0,28 50,8 100,-14 150,-30 170,-38 170,100" fill="url(#chartFill)"/>
    <!-- Dashed line (without tracking) -->
    <polyline points="-150,94 -100,90 -50,86 0,82 50,78 100,74 150,71 170,70" stroke="#e8c8a8" stroke-width="2.5" stroke-dasharray="6,4" fill="none"/>
    <!-- Good trend line -->
    <polyline points="-150,94 -100,78 -50,52 0,28 50,8 100,-14 150,-30 170,-38" stroke="#e39a5d" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Endpoint glow dot -->
    <circle cx="170" cy="-38" r="10" fill="#e39a5d" opacity="0.25"/>
    <circle cx="170" cy="-38" r="7" fill="#e39a5d" opacity="0.88"/>
    <!-- Y axis labels -->
    <text x="-162" y="-88" font-family="sans-serif" font-size="11" fill="#e39a5d" font-weight="700">High</text>
    <text x="-162" y="104" font-family="sans-serif" font-size="11" fill="#a08060">Low</text>
    <!-- Legend -->
    <line x1="-140" y1="140" x2="-112" y2="140" stroke="#e39a5d" stroke-width="3" stroke-linecap="round"/>
    <text x="-104" y="145" font-family="sans-serif" font-size="11" fill="#5a3a1a">With tracking</text>
    <line x1="20" y1="140" x2="48" y2="140" stroke="#e8c8a8" stroke-width="2.5" stroke-dasharray="5,3"/>
    <text x="56" y="145" font-family="sans-serif" font-size="11" fill="#a08060">Without</text>
  </g>

  <!-- === BELL (notification / reminder) === -->
  <g transform="translate(632, 230)" filter="url(#shadow)">
    <!-- Bell body -->
    <path d="M0,-64 Q42,-64 56,-28 Q70,8 70,40 L-70,40 Q-70,8 -56,-28 Q-42,-64 0,-64 Z" fill="#f2cba8" stroke="#e39a5d" stroke-width="3" opacity="0.90"/>
    <!-- Clapper -->
    <rect x="-16" y="38" width="32" height="14" rx="7" fill="#e39a5d" opacity="0.75"/>
    <!-- Notification badge -->
    <circle cx="54" cy="-50" r="18" fill="#e39a5d" opacity="0.95"/>
    <text x="54" y="-44" font-family="'Plus Jakarta Sans',sans-serif" font-size="16" font-weight="800" fill="#fff" text-anchor="middle">1</text>
    <!-- Stem -->
    <rect x="-7" y="-76" width="14" height="16" rx="5" fill="#e39a5d" opacity="0.70"/>
  </g>

  <!-- Category pill -->
  <rect x="252" y="108" width="296" height="42" rx="21" fill="#e39a5d" opacity="0.16"/>
  <rect x="252" y="108" width="296" height="42" rx="21" fill="none" stroke="#e39a5d" stroke-width="1.5" opacity="0.38"/>
  <text x="400" y="135" font-family="'Plus Jakarta Sans',sans-serif" font-size="15" font-weight="700" fill="#c07840" text-anchor="middle" letter-spacing="1">PREVENTIVE CARE</text>

  <!-- Paw prints -->
  <g transform="translate(115, 152)" opacity="0.16">
    <ellipse cx="0" cy="0" rx="12" ry="14" fill="#e39a5d"/>
    <ellipse cx="-16" cy="-14" rx="7" ry="8" fill="#e39a5d"/>
    <ellipse cx="16" cy="-14" rx="7" ry="8" fill="#e39a5d"/>
    <ellipse cx="-24" cy="2" rx="7" ry="8" fill="#e39a5d"/>
    <ellipse cx="24" cy="2" rx="7" ry="8" fill="#e39a5d"/>
  </g>
  <g transform="translate(675, 495)" opacity="0.13">
    <ellipse cx="0" cy="0" rx="10" ry="12" fill="#e39a5d"/>
    <ellipse cx="-13" cy="-12" rx="6" ry="7" fill="#e39a5d"/>
    <ellipse cx="13" cy="-12" rx="6" ry="7" fill="#e39a5d"/>
    <ellipse cx="-20" cy="2" rx="6" ry="7" fill="#e39a5d"/>
    <ellipse cx="20" cy="2" rx="6" ry="7" fill="#e39a5d"/>
  </g>
  <g transform="translate(145, 495)" opacity="0.12">
    <ellipse cx="0" cy="0" rx="9" ry="11" fill="#e39a5d"/>
    <ellipse cx="-12" cy="-11" rx="5" ry="6" fill="#e39a5d"/>
    <ellipse cx="12" cy="-11" rx="5" ry="6" fill="#e39a5d"/>
    <ellipse cx="-18" cy="2" rx="5" ry="6" fill="#e39a5d"/>
    <ellipse cx="18" cy="2" rx="5" ry="6" fill="#e39a5d"/>
  </g>
</svg>
