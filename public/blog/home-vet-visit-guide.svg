<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="55%" cy="40%" r="72%">
      <stop offset="0%" style="stop-color:#fde8d0"/>
      <stop offset="55%" style="stop-color:#faf0e6"/>
      <stop offset="100%" style="stop-color:#f5e4d2"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e39a5d;stop-opacity:0.20"/>
      <stop offset="100%" style="stop-color:#e39a5d;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="coral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a56a"/>
      <stop offset="100%" style="stop-color:#d4845a"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4845a"/>
      <stop offset="100%" style="stop-color:#c07040"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#c07040" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="290" rx="300" ry="250" fill="url(#glow)"/>
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.6" fill="#c07840" opacity="0.09"/>
  </pattern>
  <rect width="800" height="600" fill="url(#dots)"/>
  <circle cx="750" cy="70" r="80" fill="#e39a5d" opacity="0.08"/>
  <circle cx="50" cy="540" r="65" fill="#e39a5d" opacity="0.07"/>

  <!-- === HOUSE === -->
  <g transform="translate(320, 310)" filter="url(#shadow)">
    <!-- Body -->
    <rect x="-110" y="0" width="220" height="160" rx="8" fill="url(#coral)" opacity="0.88"/>
    <!-- Roof -->
    <polygon points="-125,0 0,-110 125,0" fill="url(#roofGrad)" opacity="0.95"/>
    <!-- Roof shine -->
    <polygon points="-125,0 0,-110 125,0" fill="none" stroke="#c07040" stroke-width="2" opacity="0.25"/>
    <!-- Door -->
    <rect x="-22" y="80" width="44" height="80" rx="22" fill="#fff8f0" opacity="0.95"/>
    <!-- Door knob -->
    <circle cx="16" cy="124" r="5" fill="#e39a5d" opacity="0.7"/>
    <!-- Windows -->
    <rect x="-96" y="30" width="56" height="48" rx="8" fill="#fff8f0" opacity="0.88"/>
    <rect x="40" y="30" width="56" height="48" rx="8" fill="#fff8f0" opacity="0.88"/>
    <!-- Window cross bars -->
    <line x1="-68" y1="30" x2="-68" y2="78" stroke="#e39a5d" stroke-width="2" opacity="0.45"/>
    <line x1="-96" y1="54" x2="-40" y2="54" stroke="#e39a5d" stroke-width="2" opacity="0.45"/>
    <line x1="68" y1="30" x2="68" y2="78" stroke="#e39a5d" stroke-width="2" opacity="0.45"/>
    <line x1="40" y1="54" x2="96" y2="54" stroke="#e39a5d" stroke-width="2" opacity="0.45"/>
    <!-- Chimney -->
    <rect x="60" y="-125" width="24" height="44" rx="4" fill="#c07040" opacity="0.75"/>
  </g>

  <!-- === STETHOSCOPE === -->
  <g transform="translate(565, 330)" filter="url(#shadow)">
    <!-- Chest piece -->
    <circle cx="0" cy="0" r="38" fill="#fff8f0" stroke="#e39a5d" stroke-width="5" opacity="0.95"/>
    <circle cx="0" cy="0" r="22" fill="#f2cba8" opacity="0.55"/>
    <!-- Cross inside chest piece -->
    <rect x="-3" y="-16" width="6" height="32" rx="3" fill="#e39a5d" opacity="0.85"/>
    <rect x="-16" y="-3" width="32" height="6" rx="3" fill="#e39a5d" opacity="0.85"/>
    <!-- Tube -->
    <path d="M0,-38 Q-40,-110 -80,-100 Q-118,-88 -118,-50 Q-118,-10 -80,-2" stroke="#e39a5d" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Earpiece -->
    <circle cx="-80" cy="-2" r="13" fill="#e39a5d" opacity="0.85"/>
    <circle cx="-80" cy="-2" r="5" fill="#fff8f0"/>
  </g>

  <!-- Category pill -->
  <rect x="256" y="110" width="288" height="42" rx="21" fill="#e39a5d" opacity="0.16"/>
  <rect x="256" y="110" width="288" height="42" rx="21" fill="none" stroke="#e39a5d" stroke-width="1.5" opacity="0.38"/>
  <text x="400" y="137" font-family="'Plus Jakarta Sans',sans-serif" font-size="15" font-weight="700" fill="#c07840" text-anchor="middle" letter-spacing="1">VETERINARY CARE</text>

  <!-- Paw prints -->
  <g transform="translate(110, 148)" opacity="0.16">
    <ellipse cx="0" cy="0" rx="12" ry="14" fill="#e39a5d"/>
    <ellipse cx="-16" cy="-14" rx="7" ry="8" fill="#e39a5d"/>
    <ellipse cx="16" cy="-14" rx="7" ry="8" fill="#e39a5d"/>
    <ellipse cx="-24" cy="2" rx="7" ry="8" fill="#e39a5d"/>
    <ellipse cx="24" cy="2" rx="7" ry="8" fill="#e39a5d"/>
  </g>
  <g transform="translate(690, 500)" opacity="0.13">
    <ellipse cx="0" cy="0" rx="10" ry="12" fill="#e39a5d"/>
    <ellipse cx="-13" cy="-12" rx="6" ry="7" fill="#e39a5d"/>
    <ellipse cx="13" cy="-12" rx="6" ry="7" fill="#e39a5d"/>
    <ellipse cx="-20" cy="2" rx="6" ry="7" fill="#e39a5d"/>
    <ellipse cx="20" cy="2" rx="6" ry="7" fill="#e39a5d"/>
  </g>
  <g transform="translate(120, 490)" opacity="0.11">
    <ellipse cx="0" cy="0" rx="9" ry="11" fill="#e39a5d"/>
    <ellipse cx="-12" cy="-11" rx="5" ry="6" fill="#e39a5d"/>
    <ellipse cx="12" cy="-11" rx="5" ry="6" fill="#e39a5d"/>
    <ellipse cx="-18" cy="2" rx="5" ry="6" fill="#e39a5d"/>
    <ellipse cx="18" cy="2" rx="5" ry="6" fill="#e39a5d"/>
  </g>
</svg>
