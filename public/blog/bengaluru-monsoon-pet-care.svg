<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" style="stop-color:#e8eef8"/>
      <stop offset="55%" style="stop-color:#edf2f8"/>
      <stop offset="100%" style="stop-color:#dde6f2"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#7eb8e0;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#7eb8e0;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="umbrella" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8e0"/>
      <stop offset="100%" style="stop-color:#5a9ecf"/>
    </linearGradient>
    <linearGradient id="coralAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a56a"/>
      <stop offset="100%" style="stop-color:#d4845a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#4a80b0" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="280" rx="300" ry="250" fill="url(#glow)"/>
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.6" fill="#5a80b0" opacity="0.09"/>
  </pattern>
  <rect width="800" height="600" fill="url(#dots)"/>
  <circle cx="740" cy="60" r="90" fill="#7eb8e0" opacity="0.10"/>
  <circle cx="60" cy="540" r="70" fill="#7eb8e0" opacity="0.08"/>

  <!-- Cloud group -->
  <g transform="translate(400, 148)" opacity="0.60">
    <circle cx="-55" cy="0" r="36" fill="#c8d8ee"/>
    <circle cx="-18" cy="-22" r="44" fill="#c8d8ee"/>
    <circle cx="28" cy="-14" r="38" fill="#c8d8ee"/>
    <circle cx="66" cy="4" r="30" fill="#c8d8ee"/>
    <rect x="-91" y="0" width="186" height="40" fill="#c8d8ee"/>
  </g>

  <!-- === UMBRELLA === -->
  <g transform="translate(400, 330)" filter="url(#shadow)">
    <!-- Canopy -->
    <path d="M-130,0 Q-130,-165 0,-178 Q130,-165 130,0 Z" fill="url(#umbrella)" opacity="0.92"/>
    <!-- Canopy panels -->
    <path d="M0,-178 L0,0" stroke="#fff" stroke-width="2" opacity="0.30"/>
    <path d="M-64,-172 Q-32,-86 0,0" stroke="#fff" stroke-width="2" opacity="0.30"/>
    <path d="M64,-172 Q32,-86 0,0" stroke="#fff" stroke-width="2" opacity="0.30"/>
    <path d="M-110,-130 Q-55,-65 0,0" stroke="#fff" stroke-width="2" opacity="0.30"/>
    <path d="M110,-130 Q55,-65 0,0" stroke="#fff" stroke-width="2" opacity="0.30"/>
    <!-- Scallop edge -->
    <path d="M-130,0 Q-112,24 -96,0 Q-78,24 -62,0 Q-44,24 -28,0 Q-10,24 8,0 Q26,24 42,0 Q60,24 76,0 Q94,24 110,0 Q122,24 130,0" fill="#5a9ecf" opacity="0.8"/>
    <!-- Handle -->
    <line x1="0" y1="0" x2="0" y2="145" stroke="#7eb8e0" stroke-width="8" stroke-linecap="round"/>
    <path d="M0,145 Q0,185 -36,185 Q-58,185 -58,165" fill="none" stroke="#7eb8e0" stroke-width="8" stroke-linecap="round"/>
    <!-- Tip -->
    <circle cx="0" cy="-178" r="7" fill="#5a9ecf"/>
  </g>

  <!-- Rain drops scattered -->
  <g fill="#8ab0d0" opacity="0.55">
    <ellipse cx="190" cy="200" rx="3.5" ry="11" transform="rotate(-12 190 200)"/>
    <ellipse cx="220" cy="170" rx="3.5" ry="11" transform="rotate(-12 220 170)"/>
    <ellipse cx="165" cy="240" rx="3" ry="9" transform="rotate(-12 165 240)"/>
    <ellipse cx="600" cy="185" rx="3.5" ry="11" transform="rotate(-12 600 185)"/>
    <ellipse cx="630" cy="158" rx="3" ry="9" transform="rotate(-12 630 158)"/>
    <ellipse cx="660" cy="210" rx="3.5" ry="11" transform="rotate(-12 660 210)"/>
    <ellipse cx="580" cy="220" rx="3" ry="9" transform="rotate(-12 580 220)"/>
    <ellipse cx="140" cy="370" rx="3" ry="9" transform="rotate(-12 140 370)"/>
    <ellipse cx="660" cy="420" rx="3" ry="9" transform="rotate(-12 660 420)"/>
    <ellipse cx="700" cy="395" rx="3.5" ry="11" transform="rotate(-12 700 395)"/>
    <ellipse cx="250" cy="490" rx="3" ry="9" transform="rotate(-12 250 490)"/>
    <ellipse cx="570" cy="480" rx="3.5" ry="11" transform="rotate(-12 570 480)"/>
  </g>

  <!-- Paw print with coral accent -->
  <g transform="translate(590, 430)" opacity="0.22">
    <ellipse cx="0" cy="0" rx="14" ry="16" fill="#e39a5d"/>
    <ellipse cx="-18" cy="-16" rx="8" ry="9" fill="#e39a5d"/>
    <ellipse cx="18" cy="-16" rx="8" ry="9" fill="#e39a5d"/>
    <ellipse cx="-27" cy="2" rx="8" ry="9" fill="#e39a5d"/>
    <ellipse cx="27" cy="2" rx="8" ry="9" fill="#e39a5d"/>
  </g>
  <g transform="translate(175, 490)" opacity="0.16">
    <ellipse cx="0" cy="0" rx="10" ry="12" fill="#e39a5d"/>
    <ellipse cx="-13" cy="-12" rx="6" ry="7" fill="#e39a5d"/>
    <ellipse cx="13" cy="-12" rx="6" ry="7" fill="#e39a5d"/>
    <ellipse cx="-20" cy="2" rx="6" ry="7" fill="#e39a5d"/>
    <ellipse cx="20" cy="2" rx="6" ry="7" fill="#e39a5d"/>
  </g>

  <!-- Category pill -->
  <rect x="252" y="108" width="296" height="42" rx="21" fill="#7eb8e0" opacity="0.22"/>
  <rect x="252" y="108" width="296" height="42" rx="21" fill="none" stroke="#5a9ecf" stroke-width="1.5" opacity="0.40"/>
  <text x="400" y="135" font-family="'Plus Jakarta Sans',sans-serif" font-size="15" font-weight="700" fill="#3a6a9a" text-anchor="middle" letter-spacing="1">SEASONAL CARE</text>
</svg>
